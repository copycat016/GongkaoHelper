services:
  postgres:
    image: postgres:16-alpine
    container_name: gkweb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gkweb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gkweb_password}
      POSTGRES_DB: ${POSTGRES_DB:-gkweb}
      TZ: ${DB_TIMEZONE:-Asia/Shanghai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - gkweb_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gkweb} -d ${POSTGRES_DB:-gkweb}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  gkweb_postgres_data:
